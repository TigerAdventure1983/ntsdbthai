<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tiger Adventure System</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #f4f6f9; }
        
        /* ตกแต่งกล่องปุ่ม Google ให้ลอยอยู่ตรงกลางด้านบน */
        #google-btn-wrapper {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999; /* ให้อยู่เหนือ iframe */
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        iframe {
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0; left: 0;
            border: none;
        }
    </style>
</head>
<body>

    <div id="google-btn-wrapper">
        <span style="font-family: 'Sarabun', sans-serif; font-weight: bold; color: #333;">เข้าสู่ระบบด้วย: </span>
        <div id="g_id_onload"
             data-client_id="697390183584-d6r3m59bm807l00cg11lqn7splkestl5.apps.googleusercontent.com"
             data-callback="handleGoogleLogin">
        </div>
        <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large"></div>
    </div>

    <iframe id="gasIframe" scrolling="no" src="https://script.google.com/macros/s/AKfycbzHcCX12Wz_k2O_ZE4bkocK1k1QXr3S6BGCq8ZhZYP5CQUnkRMxNaUt7Kyte5dszxjd/exec"></iframe>

    <script>
        // 4. ฟังก์ชันรับ Token จาก Google แล้วยิงทะลุไปให้ iframe
        function handleGoogleLogin(response) {
            // ซ่อนปุ่ม Google ทิ้งไปเมื่อล็อกอินสำเร็จ
            document.getElementById('google-btn-wrapper').style.display = 'none';
            
            // ส่งข้อความ (Token) ทะลุกระจกเข้าไปใน iframe
            const iframe = document.getElementById('gasIframe');
            iframe.contentWindow.postMessage({
                type: 'GOOGLE_LOGIN_SUCCESS',
                token: response.credential
            }, '*');
        }
    </script>
</body>
</html>
