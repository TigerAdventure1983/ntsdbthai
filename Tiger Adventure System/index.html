<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tiger Adventure System</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #f4f6f9; }
        
        /* ตกแต่งกล่องปุ่ม Google ให้ลอยอยู่ด้านบน */
        #google-btn-wrapper {
            position: absolute;
            top: 25px; /* ระยะห่างจากขอบบน */
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999; /* ให้อยู่เหนือ iframe */
            background: #ffffff;
            padding: 8px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #e0e0e0;
        }
        
        iframe {
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0; left: 0;
            border: none;
        }
    </style>
</head>
<body>

    <div id="google-btn-wrapper">
        <span style="font-family: sans-serif; font-size: 14px; font-weight: bold; color: #555;">เข้าสู่ระบบด้วย: </span>
        
        <div id="g_id_onload"
             data-client_id="697390183584-d6r3m59bm807l00cg11lqn7splkestl5.apps.googleusercontent.com"
             data-callback="handleGoogleLogin">
        </div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="medium"></div>
    </div>

    <iframe id="gasIframe" scrolling="no" src="https://script.google.com/macros/s/AKfycbzHcCX12Wz_k2O_ZE4bkocK1k1QXr3S6BGCq8ZhZYP5CQUnkRMxNaUt7Kyte5dszxjd/exec"></iframe>

    <script>
        // ฟังก์ชันรับ Token จาก Google แล้วยิงเข้าไปใน iframe
        function handleGoogleLogin(response) {
            console.log("1. ล็อกอิน Google สำเร็จ! ได้ Token มาแล้ว");
            
            // ซ่อนปุ่ม Google ทิ้งไป
            document.getElementById('google-btn-wrapper').style.display = 'none';
            
            // ส่งข้อความ (Token) เข้าไปใน iframe
            const iframe = document.getElementById('gasIframe');
            console.log("2. กำลังยิง Token ทะลุเข้า iframe...");
            iframe.contentWindow.postMessage({
                type: 'GOOGLE_LOGIN_SUCCESS',
                token: response.credential
            }, '*');
        }
    </script>
</body>
</html>
