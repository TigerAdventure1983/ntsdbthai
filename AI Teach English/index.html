<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Teach English</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: #f4f7f6; 
            margin: 0; 
        }
        .container { 
            text-align: center; 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            max-width: 90%;
            width: 400px;
        }
        .avatar {
            font-size: 60px;
            margin-bottom: 10px;
        }
        h1 { 
            color: #0056b3; 
            margin-top: 0;
            font-size: 24px;
        }
        p {
            color: #555;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        button { 
            background-color: #0056b3; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            transition: background 0.3s;
            box-shadow: 0 4px 6px rgba(0, 86, 179, 0.2);
        }
        button:hover { 
            background-color: #004494; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar">👩‍💼</div>
        <h1>QMR English Tutor</h1>
        <p>ยินดีต้อนรับสู่ระบบผู้ช่วยฝึกภาษาอังกฤษสำหรับงาน QA/QC<br>กรุณากดปุ่มด้านล่างเพื่อเข้าสู่ระบบ (รองรับการใช้ไมโครโฟน)</p>
        
        <button onclick="window.location.href='https://script.google.com/macros/s/AKfycbyWy30mLdKw49seGZSIbYBnFZ_dcIhWkE68fxEMStjlH4fbKKVQ-a71JUhmGvKPNO2b/exec'">
            🚀 เปิดระบบผู้ช่วยสอน
        </button>
    </div>

</body>
</html>
